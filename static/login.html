<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — PrestaRápido</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">Presta<span>Rápido</span></div>
    <p class="auth-subtitle">Ingresa a tu cuenta para gestionar tus créditos</p>

    <div class="alert alert-error" id="alerta"></div>

    <form id="form-login" autocomplete="off">
      <div class="form-grid una-col">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="usuario@correo.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div style="position:relative">
            <input type="password" id="password" placeholder="••••••••" required style="padding-right:2.5rem">
            <button type="button" onclick="togglePass()" id="eye-btn"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--gris-texto)">👁</button>
          </div>
        </div>
      </div>

      <div style="margin-top:1.5rem">
        <button type="submit" class="btn btn-primary btn-full" id="btn-login">
          Iniciar Sesión
        </button>
      </div>
    </form>

    <hr class="divider">
    <p style="text-align:center;font-size:0.875rem;color:var(--gris-texto);margin-bottom:0.5rem">
      <a href="/static/recuperar.html" style="color:var(--azul-acento);font-weight:600">¿Olvidaste tu contraseña?</a>
    </p>
    <p style="text-align:center;font-size:0.875rem;color:var(--gris-texto)">
      ¿No tienes cuenta? <a href="/static/registro.html" style="color:var(--azul-acento);font-weight:600">Regístrate aquí</a>
    </p>
  </div>
</div>

<script>
  const API = '';

  function togglePass() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function mostrarError(msg) {
    const el = document.getElementById('alerta');
    el.textContent = msg;
    el.className = 'alert alert-error show';
  }

  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    btn.innerHTML = '<span class="loader"></span> Ingresando...';
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const body = new URLSearchParams({ username: email, password });

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error al iniciar sesión');

      localStorage.setItem('token', data.access_token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      window.location.href = '/static/dashboard.html';
    } catch (err) {
      mostrarError(err.message);
      btn.innerHTML = 'Iniciar Sesión';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
