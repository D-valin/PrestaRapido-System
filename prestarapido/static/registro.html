<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — PrestaRápido</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up" style="max-width:520px">
    <div class="auth-logo">Presta<span>Rápido</span></div>
    <p class="auth-subtitle">Crea tu cuenta y empieza a solicitar créditos</p>

    <div class="alert" id="alerta"></div>

    <form id="form-registro" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Juan Pérez" required>
        </div>
        <div class="form-group">
          <label for="documento">Documento de identidad</label>
          <input type="text" id="documento" placeholder="1234567890" required>
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="juan@correo.com" required>
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono (opcional)</label>
          <input type="tel" id="telefono" placeholder="300 000 0000">
        </div>
        <div class="form-group">
          <label for="nacimiento">Fecha de nacimiento</label>
          <input type="date" id="nacimiento" required>
        </div>
        <div class="form-group">
          <label for="ingreso">Ingreso mensual (COP)</label>
          <input type="number" id="ingreso" min="0" step="50000" placeholder="1500000" required>
        </div>
        <div class="form-group full">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>
        <div class="form-group full">
          <label for="password2">Confirmar contraseña</label>
          <input type="password" id="password2" placeholder="Repite la contraseña" required>
        </div>
      </div>

      <div style="margin-top:1.5rem">
        <button type="submit" class="btn btn-primary btn-full" id="btn-reg">
          Crear cuenta
        </button>
      </div>
    </form>

    <hr class="divider">
    <p style="text-align:center;font-size:0.875rem;color:var(--gris-texto)">
      ¿Ya tienes cuenta? <a href="/static/login.html" style="color:var(--azul-acento);font-weight:600">Inicia sesión</a>
    </p>
  </div>
</div>

<script>
  const API = '';

  function mostrar(msg, tipo = 'error') {
    const el = document.getElementById('alerta');
    el.textContent = msg;
    el.className = `alert alert-${tipo} show`;
  }

  document.getElementById('form-registro').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-reg');

    const pass = document.getElementById('password').value;
    const pass2 = document.getElementById('password2').value;
    if (pass !== pass2) return mostrar('Las contraseñas no coinciden');

    btn.innerHTML = '<span class="loader"></span> Creando cuenta...';
    btn.disabled = true;

    const payload = {
      nombre_completo: document.getElementById('nombre').value,
      documento_identidad: document.getElementById('documento').value,
      email: document.getElementById('email').value,
      telefono: document.getElementById('telefono').value || null,
      password_hash: pass,
      estado_verificacion: 'pendiente',
      fecha_nacimiento: document.getElementById('nacimiento').value || null,
      ingreso_mensual: parseFloat(document.getElementById('ingreso').value) || null,
    };

    try {
      const res = await fetch(`${API}/usuarios/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error al registrarse');

      mostrar('¡Cuenta creada exitosamente! Redirigiendo...', 'success');
      setTimeout(() => window.location.href = '/static/login.html', 1800);
    } catch (err) {
      mostrar(err.message);
      btn.innerHTML = 'Crear cuenta';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
